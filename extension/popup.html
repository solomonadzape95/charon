<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 280px; margin: 0; font: 13px/1.5 system-ui, sans-serif; background: #0e0e10; color: #ededed; }
      .wrap { padding: 14px; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      label { display: block; font-size: 11px; color: #9a9a9a; margin: 10px 0 3px; }
      input { width: 100%; box-sizing: border-box; padding: 7px 8px; border-radius: 7px; border: 1px solid #2a2a2e; background: #18181b; color: #ededed; }
      button { width: 100%; margin-top: 12px; padding: 8px; border: 0; border-radius: 7px; background: #e8b339; color: #000; font-weight: 600; cursor: pointer; }
      .ok { color: #4ade80; }
      .muted { color: #9a9a9a; font-size: 11px; margin-top: 8px; }
      code { color: #e8b339; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>ⲭ Charon</h1>
      <div id="status" class="muted"></div>
      <label>Charon URL</label>
      <input id="baseUrl" placeholder="https://your-charon.app" />
      <label>Your reader ID</label>
      <input id="userId" placeholder="from dashboard → Connect Extension" />
      <button id="save">Save</button>
      <p class="muted">Then click the <code>✦ Tip</code> button on any page.</p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
