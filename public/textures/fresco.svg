<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <!-- Broad plaster blotches. Grayscale, opaque, mean ~0.5 so an `overlay`
         blend adds texture without lightening or darkening the page. -->
    <filter id="plaster" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="5" seed="11" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0 0 0 0 1"/>
    </filter>
    <!-- Fine pigment tooth, same neutral mapping. -->
    <filter id="grain" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="2" seed="5" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0 0 0 0 1"/>
    </filter>
  </defs>
  <rect width="600" height="600" filter="url(#plaster)"/>
  <rect width="600" height="600" filter="url(#grain)" opacity="0.35"/>
</svg>
